<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Support Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-deep: #0b0f1a;
        --surface: #141a2a;
        --surface-2: #1c2336;
        --border: #262e45;
        --accent-1: #6366f1;
        --accent-2: #a855f7;
        --text-light: #e8eaf0;
        --text-muted: #8b92a8;
        --positive: #34d399;
        --neutral: #8b92a8;
        --negative: #fbbf24;
        --frustrated: #f87171;
    }

    * { box-sizing: border-box; }

    body {
        font-family: 'Inter', sans-serif;
        margin: 0;
    }

    #chat-button {
        position: fixed;
        bottom: 24px;
        right: 24px;
        height: 60px;
        width: 60px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 20px rgba(99, 102, 241, 0.45);
        animation: pulse 2.5s infinite;
        transition: transform 0.2s ease;
        z-index: 1000;
    }

    #chat-button:hover { transform: scale(1.06); }

    @keyframes pulse {
        0%   { box-shadow: 0 4px 20px rgba(99, 102, 241, 0.45); }
        50%  { box-shadow: 0 4px 28px rgba(168, 85, 247, 0.65); }
        100% { box-shadow: 0 4px 20px rgba(99, 102, 241, 0.45); }
    }

    #chat-container {
        display: none;
        flex-direction: column;
        position: fixed;
        bottom: 96px;
        right: 24px;
        width: 340px;
        height: 460px;
        background: var(--bg-deep);
        border: 1px solid var(--border);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        animation: slideUp 0.25s ease;
        z-index: 1000;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    #chat-header {
        background: linear-gradient(120deg, var(--accent-1), var(--accent-2));
        padding: 14px 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
    }

    .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--positive);
        box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.6);
        animation: dotPulse 2s infinite;
    }

    @keyframes dotPulse {
        0%   { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.6); }
        70%  { box-shadow: 0 0 0 6px rgba(52, 211, 153, 0); }
        100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
    }

    .header-text { display: flex; flex-direction: column; }
    .header-title { color: white; font-weight: 600; font-size: 14px; }
    .header-subtitle { color: rgba(255,255,255,0.85); font-size: 11px; }

    #chat-box {
        flex-grow: 1;
        overflow-y: auto;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    #chat-box::-webkit-scrollbar { width: 5px; }
    #chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-row {
        display: flex;
        flex-direction: column;
        max-width: 80%;
        animation: fadeIn 0.25s ease;
        margin-bottom: 8px;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { align-self: flex-end; align-items: flex-end; }
    .msg-row.bot { align-self: flex-start; align-items: flex-start; }

    .bubble {
        padding: 10px 13px;
        font-size: 13.5px;
        line-height: 1.45;
        border-radius: 14px;
    }

    .user .bubble {
        background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
        color: white;
        border-bottom-right-radius: 4px;
    }

    .bot .bubble {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text-light);
        border-bottom-left-radius: 4px;
    }

    .tag-row {
        margin-top: 4px;
        font-size: 10px;
        color: var(--text-muted);
        display: flex;
        gap: 6px;
        align-items: center;
        padding-left: 2px;
    }

    .tag-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
    }

    .typing-bubble {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        border-bottom-left-radius: 4px;
        padding: 11px 14px;
        display: inline-flex;
        gap: 4px;
        align-self: flex-start;
        animation: fadeIn 0.2s ease;
    }

    .typing-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--text-muted);
        animation: bounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
        0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
        30% { transform: translateY(-4px); opacity: 1; }
    }

    #chat-input-container {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px;
        border-top: 1px solid var(--border);
        background: var(--bg-deep);
        flex-shrink: 0;
    }

    #user-input {
        flex-grow: 1;
        padding: 10px 14px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--surface-2);
        color: var(--text-light);
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        outline: none;
    }

    #user-input::placeholder { color: var(--text-muted); }
    #user-input:focus { border-color: var(--accent-1); }

    #send-btn {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: none;
        background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: opacity 0.15s ease;
    }

    #send-btn:hover { opacity: 0.85; }
</style>
</head>
<body>

<button id="chat-button" onclick="toggleChat()">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
    </svg>
</button>

<div id="chat-container">
    <div id="chat-header" onclick="toggleChat()">
        <span class="status-dot"></span>
        <div class="header-text">
            <span class="header-title">Support Assistant</span>
            <span class="header-subtitle">Typically replies instantly</span>
        </div>
    </div>
    <div id="chat-box"></div>
    <div id="chat-input-container">
        <input type="text" id="user-input" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button id="send-btn" onclick="sendMessage()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
                <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"></path>
            </svg>
        </button>
    </div>
</div>

<script>
    const sentimentColors = {
        positive: 'var(--positive)',
        neutral: 'var(--neutral)',
        negative: 'var(--negative)',
        frustrated: 'var(--frustrated)'
    };

    function toggleChat() {
        const c = document.getElementById('chat-container');
        c.style.display = (c.style.display === 'flex') ? 'none' : 'flex';
    }

    function showTyping() {
        const chatBox = document.getElementById('chat-box');
        const typingEl = document.createElement('div');
        typingEl.id = 'typing-indicator';
        typingEl.innerHTML = `
            <div class="typing-bubble">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>`;
        chatBox.appendChild(typingEl);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeTyping() {
        const el = document.getElementById('typing-indicator');
        if (el) el.remove();
    }

    function sendMessage() {
        const inputField = document.getElementById('user-input');
        const message = inputField.value.trim();
        const chatBox = document.getElementById('chat-box');

        if (!message) return;

        chatBox.innerHTML += `
            <div class="msg-row user">
                <div class="bubble">${message}</div>
            </div>`;
        inputField.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        showTyping();

        fetch('/get_response', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: message })
        })
        .then(response => response.json())
        .then(data => {
            removeTyping();

            const sentiment = data.sentiment || 'neutral';
            const intent = data.intent || 'general';
            const color = sentimentColors[sentiment] || sentimentColors.neutral;

            chatBox.innerHTML += `
                <div class="msg-row bot">
                    <div class="bubble">${data.response}</div>
                    <div class="tag-row">
                        <span class="tag-dot" style="background:${color}"></span>
                        <span>${intent} · ${sentiment}</span>
                    </div>
                </div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        })
        .catch(() => {
            removeTyping();
            chatBox.innerHTML += `
                <div class="msg-row bot">
                    <div class="bubble">Something went wrong. Please try again.</div>
                </div>`;
        });
    }
</script>
</body>
</html>
